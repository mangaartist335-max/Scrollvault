<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScrollVault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0f1e;
      color: #f8fafc;
      padding: 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 16px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 900;
      color: #38bdf8;
    }
    .logo p {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* Auth section */
    #auth-section { display: none; }
    #auth-section.visible { display: block; }
    #dashboard-section { display: none; }
    #dashboard-section.visible { display: block; }

    label {
      font-size: 12px;
      color: #94a3b8;
      display: block;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1a2236;
      color: #f8fafc;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #38bdf8; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: #38bdf8; color: #0a0f1e; }
    .btn-danger {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      margin-top: 12px;
    }

    .balance-display {
      text-align: center;
      padding: 16px;
      background: #1a2236;
      border: 1px solid #38bdf8;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .balance-amount {
      font-size: 36px;
      font-weight: 900;
      color: #10b981;
    }
    .balance-sub {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .status {
      font-size: 12px;
      color: #10b981;
      text-align: center;
      margin-top: 8px;
    }
    .error {
      font-size: 12px;
      color: #ef4444;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>ScrollVault 🔒</h1>
    <p>Your doom scrolling pays off.</p>
  </div>

  <!-- Login section -->
  <div id="auth-section">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
    <button class="btn btn-primary" id="login-btn">Log In</button>
    <p id="auth-error" class="error"></p>
  </div>

  <!-- Dashboard section -->
  <div id="dashboard-section">
    <div class="balance-display">
      <div class="balance-amount" id="balance-amount">$0</div>
      <div class="balance-sub">out of $20 max</div>
    </div>
    <p class="status">✓ Tracking active on supported sites</p>
    <button class="btn btn-danger" id="logout-btn">Log Out</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
